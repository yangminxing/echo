server:
  port: 8086

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3360/echo?characterEncoding=utf8&serverTimezone=GMT%2B8
    username: root
    password: MSTF#*@@J4W5

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: org.echo.entity
  configuration:
    map-underscore-to-camel-case: true

flowable:
  # 配置自动建表
  database-schema-update: false
  history-level: full
  async-executor-activate: false